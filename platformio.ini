; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Common settings for all environments
[env]
framework = arduino
platform = espressif32
upload_protocol = esptool
monitor_speed = 115200
monitor_filters =
	esp32_exception_decoder
	time
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
build_flags =
	-DCUSTOMBOARD
	-DUSE_GFX_LITE
lib_deps =
	Wire
	https://github.com/mrcodetastic/GFX_Lite
	mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.0
	h2zero/NimBLE-Arduino
	kosme/arduinoFFT@^2.0.0
	depau/APDS-9930 Ambient Light and Proximity Sensor@^1.0.0
	adafruit/Adafruit LIS3DH@^1.3.0
	adafruit/Adafruit NeoPixel@^1.15.4
	olikraus/U8g2@^2.0.0

; Kimmix Controller V2 - Custom Board (Debug)
[env:KimmixControllerV2]
board = kmmx-protogen-v2
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.f_flash = 80000000L
upload_speed = 1500000
build_flags =
	${env.build_flags}
	-DCORE_DEBUG_LEVEL=5
	-DBOARD_HAS_PSRAM=0
	-DBLE_DEVICE_NAME=\"KimmixControllerV2\"
	-DBLE_LOCAL_NAME=\"KMMX-Debug\"

; Kimmix Controller V2 - Custom Board (Release)
[env:KimmixControllerV2-release]
board = kmmx-protogen-v2
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.f_flash = 80000000L
upload_speed = 1500000
build_flags =
	${env.build_flags}
	-DCORE_DEBUG_LEVEL=0
	-DBOARD_HAS_PSRAM=0
	-Os
	-DNDEBUG
	-DBLE_DEVICE_NAME=\"KimmixControllerV2\"
	-DBLE_LOCAL_NAME=\"KMMX\"

; ESP32-S3-DevKitC-1 N16R8
[env:esp32s3-devkitc-1]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
upload_speed = 921600
build_flags =
	${env.build_flags}
	-DCORE_DEBUG_LEVEL=5
	-DBOARD_HAS_PSRAM=1
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBLE_DEVICE_NAME=\"esp32s3-devkitc-1\"
	-DBLE_LOCAL_NAME=\"KMMX-DevKit\"